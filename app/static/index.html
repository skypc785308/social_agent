<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輿情分析助手 - Social Sentiment Agent</title>
    <meta name="description" content="AI-powered social sentiment analysis assistant">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --bg-user-bubble: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --bg-agent-bubble: rgba(255, 255, 255, 0.06);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.3);
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(129, 140, 248, 0.5);
            --success: #34d399;
            --error: #f87171;
            --gradient-bg: linear-gradient(180deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a0f 100%);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-bubble: 20px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gradient-bg);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 42px;
            height: 42px;
            background: var(--bg-user-bubble);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4);
            }

            50% {
                opacity: 0.8;
                box-shadow: 0 0 0 6px rgba(52, 211, 153, 0);
            }
        }

        .btn-reset {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--error);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: rgba(248, 113, 113, 0.4);
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--bg-user-bubble);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .welcome h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
        }

        .suggestion {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-focus);
            color: var(--text-primary);
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            animation: slideUp 0.3s ease;
            max-width: 85%;
        }

        .message.user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .message.agent {
            margin-right: auto;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
        }

        .message.agent .avatar {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .bubble {
            padding: 14px 18px;
            line-height: 1.65;
            font-size: 14px;
            word-break: break-word;
        }

        .message.user .bubble {
            background: var(--bg-user-bubble);
            color: #fff;
            border-radius: var(--radius-bubble) 6px var(--radius-bubble) var(--radius-bubble);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            white-space: pre-wrap;
        }

        .message.agent .bubble {
            background: var(--bg-agent-bubble);
            border: 1px solid var(--border);
            border-radius: 6px var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Markdown Styles inside agent bubble */
        .message.agent .bubble p {
            margin-bottom: 0.8em;
        }

        .message.agent .bubble p:last-child {
            margin-bottom: 0;
        }

        .message.agent .bubble pre {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid var(--border);
        }

        .message.agent .bubble code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .message.agent .bubble pre code {
            background: transparent;
            padding: 0;
        }

        .message.agent .bubble ul,
        .message.agent .bubble ol {
            margin: 8px 0 8px 24px;
        }

        .message.agent .bubble li {
            margin-bottom: 4px;
        }

        .message.agent .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }

        .message.agent .bubble th,
        .message.agent .bubble td {
            border: 1px solid var(--border);
            padding: 8px 10px;
            text-align: left;
        }

        .message.agent .bubble th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        .message.agent .bubble h1,
        .message.agent .bubble h2,
        .message.agent .bubble h3 {
            margin: 1.2em 0 0.6em 0;
            font-weight: 600;
            line-height: 1.3;
        }

        .message.agent .bubble h1 {
            font-size: 1.3em;
        }

        .message.agent .bubble h2 {
            font-size: 1.2em;
        }

        .message.agent .bubble h3 {
            font-size: 1.1em;
        }



        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Input area */
        .input-area {
            flex-shrink: 0;
            padding: 12px 0 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            line-height: 1.5;
            padding: 4px 0;
        }

        #message-input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 40px;
            height: 40px;
            background: var(--bg-user-bubble);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-send svg {
            width: 20px;
            height: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 10px 0 4px;
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app {
                padding: 8px;
            }

            .header {
                padding: 12px 16px;
            }

            .message {
                max-width: 92%;
            }

            .suggestions {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header" role="banner">
            <div class="header-left">
                <div class="header-icon" aria-hidden="true">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <div class="header-title">
                    <h1>輿情分析助手</h1>
                    <p>Social Sentiment Agent</p>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>線上</span>
                </div>
                <button class="btn-reset" id="btn-reset" title="清除對話記錄">清除對話</button>
            </div>
        </header>

        <!-- Chat -->
        <main class="chat-area" id="chat-area" role="log" aria-live="polite">
            <div class="welcome" id="welcome">
                <div class="welcome-icon" aria-hidden="true">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                </div>
                <h2>歡迎使用輿情分析助手</h2>
                <p>我可以幫你搜尋社群媒體上的網路聲量、分析輿情趨勢、查看熱門貼文，支援 Facebook、Instagram、YouTube、論壇及新聞媒體等平台。</p>
                <div class="suggestions">
                    <button class="suggestion" data-msg="搜尋「AI」在 Facebook 上最近一週的輿情">搜尋 AI 輿情</button>
                    <button class="suggestion" data-msg="幫我分析「台積電」在各平台的網路聲量趨勢">台積電聲量趨勢</button>
                    <button class="suggestion" data-msg="查看論壇上「iPhone」討論最熱的版面">iPhone 論壇排行</button>
                    <button class="suggestion" data-msg="比較「ChatGPT」和「Gemini」的 Google 搜尋趨勢">Google 趨勢比較</button>
                </div>
            </div>
        </main>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="message-input" placeholder="輸入訊息，例如：搜尋「AI」的輿情..." rows="1" aria-label="輸入訊息"></textarea>
                <button class="btn-send" id="btn-send" aria-label="發送訊息" title="發送">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="footer">
            Powered by LangChain + FastAPI &middot; QSearch API
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            const chatArea = document.getElementById('chat-area');
            const input = document.getElementById('message-input');
            const btnSend = document.getElementById('btn-send');
            const btnReset = document.getElementById('btn-reset');
            const welcome = document.getElementById('welcome');

            const API_KEY = "__API_KEY_PLACEHOLDER__";

            let sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
            let isLoading = false;
            let isComposing = false;

            marked.setOptions({
                breaks: true,
                gfm: true
            });

            // Auto-resize textarea
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            });

            // IME Composition Events
            input.addEventListener('compositionstart', () => {
                isComposing = true;
            });

            input.addEventListener('compositionend', () => {
                // Add a small delay so keydown 'Enter' can see it's still composing or just ended
                setTimeout(() => {
                    isComposing = false;
                }, 100);
            });

            // Send on Enter (Shift+Enter for newline)
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !isComposing && !e.isComposing) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            btnSend.addEventListener('click', sendMessage);

            // Suggestion buttons
            document.querySelectorAll('.suggestion').forEach(btn => {
                btn.addEventListener('click', () => {
                    input.value = btn.dataset.msg;
                    sendMessage();
                });
            });

            // Reset
            btnReset.addEventListener('click', async () => {
                try {
                    await fetch('/api/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                        body: JSON.stringify({ session_id: sessionId }),
                    });
                } catch (_) { }
                sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
                chatArea.innerHTML = '';
                chatArea.appendChild(createWelcome());
                input.focus();
            });

            function createWelcome() {
                const div = document.createElement('div');
                div.className = 'welcome';
                div.id = 'welcome';
                div.innerHTML = `
                <div class="welcome-icon" aria-hidden="true">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <h2>歡迎使用輿情分析助手</h2>
                <p>我可以幫你搜尋社群媒體上的網路聲量、分析輿情趨勢、查看熱門貼文。</p>
                <div class="suggestions">
                    <button class="suggestion" data-msg="搜尋「AI」在 Facebook 上最近一週的輿情">搜尋 AI 輿情</button>
                    <button class="suggestion" data-msg="幫我分析「台積電」在各平台的網路聲量趨勢">台積電聲量趨勢</button>
                    <button class="suggestion" data-msg="查看論壇上「iPhone」討論最熱的版面">iPhone 論壇排行</button>
                    <button class="suggestion" data-msg="比較「ChatGPT」和「Gemini」的 Google 搜尋趨勢">Google 趨勢比較</button>
                </div>`;
                div.querySelectorAll('.suggestion').forEach(btn => {
                    btn.addEventListener('click', () => {
                        input.value = btn.dataset.msg;
                        sendMessage();
                    });
                });
                return div;
            }

            function addMessage(role, text) {
                if (welcome && welcome.parentNode) welcome.remove();

                const div = document.createElement('div');
                div.className = `message ${role}`;

                const avatar = role === 'user'
                    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
                    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>';

                let contentStr = '';
                if (role === 'user') {
                    contentStr = escapeHtml(text);
                } else {
                    contentStr = DOMPurify.sanitize(marked.parse(text));
                }

                div.innerHTML = `
                <div class="avatar" aria-hidden="true">${avatar}</div>
                <div class="bubble">${contentStr}</div>`;
                chatArea.appendChild(div);
                scrollToBottom();
                return div;
            }

            function addTypingIndicator() {
                if (welcome && welcome.parentNode) welcome.remove();
                const div = document.createElement('div');
                div.className = 'message agent';
                div.id = 'typing';
                div.innerHTML = `
                <div class="avatar" aria-hidden="true">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                </div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>`;
                chatArea.appendChild(div);
                scrollToBottom();
            }

            function removeTypingIndicator() {
                const el = document.getElementById('typing');
                if (el) el.remove();
            }

            async function sendMessage() {
                const text = input.value.trim();
                if (!text || isLoading) return;

                isLoading = true;
                btnSend.disabled = true;
                input.value = '';
                input.style.height = 'auto';

                addMessage('user', text);
                addTypingIndicator();

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                        body: JSON.stringify({ message: text, session_id: sessionId }),
                    });

                    removeTypingIndicator();

                    if (!res.ok) {
                        const err = await res.json().catch(() => ({ detail: '伺服器發生錯誤' }));
                        addMessage('agent', `⚠️ 錯誤：${err.detail || '請求失敗，請稍後再試'}`);
                    } else {
                        const data = await res.json();
                        sessionId = data.session_id;
                        addMessage('agent', data.response);
                    }
                } catch (err) {
                    removeTypingIndicator();
                    addMessage('agent', `⚠️ 網路錯誤：${err.message}`);
                } finally {
                    isLoading = false;
                    btnSend.disabled = false;
                    input.focus();
                }
            }

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    chatArea.scrollTop = chatArea.scrollHeight;
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            input.focus();
        })();
    </script>
</body>

</html>
